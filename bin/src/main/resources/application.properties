# ===================================
# SERVER
# ===================================
server.port=8080

# ===================================
# MYSQL DATABASE CONNECTION
# ===================================
spring.datasource.url=jdbc:mysql://localhost:3306/peer_review_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_mysql_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================
# JPA / HIBERNATE
# ===================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===================================
# JWT
# ===================================
app.jwt.secret=PeerReviewPlatformSecretKey2024SuperSecureBase64EncodedString!!
app.jwt.expiration=86400000

# ===================================
# FILE UPLOAD
# ===================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/

# ===================================
# CORS - React frontend URL
# ===================================
app.cors.allowed-origins=http://localhost:5173
