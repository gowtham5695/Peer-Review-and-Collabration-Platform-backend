# ===================================
# SERVER
# ===================================
server.port=${PORT:8080}

# ===================================
# MYSQL DATABASE CONNECTION
# ===================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================
# JPA / HIBERNATE
# ===================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===================================
# JWT
# ===================================
app.jwt.secret=PeerReviewPlatformSecretKey2024SuperSecureBase64EncodedString!!
app.jwt.expiration=86400000

# ===================================
# FILE UPLOAD
# ===================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/

# ===================================
# CORS - React frontend URL
# ===================================
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

springdoc.swagger-ui.path=/peer_review.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method